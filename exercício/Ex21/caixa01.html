<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo de Caixas</title>
    <style>
        h1 {
            
           background-color: aqua;
           height: 300px;
           width: 300px;
           border-width: 10px;
           border: 10px solid blueviolet;
           padding: 10px 10px 10px 10px;
           margin: 20px auto 20px auto;
           outline: 5px dashed rgb(16, 199, 10);

        }
        a {
            
            border: 10px solid red;
            padding: 10px;
        }
    </style>
</head>
<body>
    <h1>Exemplo de caixa box-level</h1>
    <p>Páragrafos também são exemplos de box-level, pórem os <a href="#">links são exemplos de caixas inline-level</a>. Vamos ver como tudo isso funciona.</p>
    
</body>
</html>
