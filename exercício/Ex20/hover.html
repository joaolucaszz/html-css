<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hover</title>
    <style>
        div:hover {
            color: aqua;
        }
        div > p {
            display: none;
        }
        div:hover > p {
            display: block;
            color: rgb(192, 10, 10);
            font-size: 40px;
        }

        div:hover {
            display: inline-block;
            width: 200px;
            height: 200px;
            text-align: center;
        }
    </style>

    
    
</head>
<body>
    <h1>Exemplo de hover</h1>
    <p>Passe o mouse sobre o texto abaixo</p>
    <div>Passe o mouse aqui
        <p>Raael</p>
    </div>

    <div>01</div>
    <div>02</div>
    <div>03</div>
   
    
    
</body>
</html>
