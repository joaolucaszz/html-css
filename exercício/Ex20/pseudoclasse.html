<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pseudo-classes</title>
    <style>
        div {
            display: inline-block;
            background-color: white;
            text-align: center;
            border: 1px solid black;
            height: 200px;
            width: 200px;
        }
        div:hover {
            background-color: blue;
        }
       


    </style>
</head>
<body>
    
    <h1>
        <div class="d1">01</div>
    </h1>
    <h2>
        <div class="d2">02</div>
    </h2>
    <h3>
        <div class="d3">03</div>
    </h3>
    <h4>
        <div class="d4">04</div>
    </h4>
    
</body>
</html>
