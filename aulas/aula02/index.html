<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Parágrafos </title>
</head>
<body>
    <h1> Parágrafos e quebras de linhas </h1>
    <hr>
    <p> Eu posso escrever
        um parágrafo de
        qualquer jeito.
        Só basta ficar tudo
        no meio das tags:
        &lt;p&gt; e &lt;/p&gt; 
    </p>
    <p> Se eu quiser quebrar a linha <br>
         use a tag: &lt;br&gt;
    </p>
    <p> Vamos adicionar alguns simbololos especiais:
        &Delta;
        &uarr;
    </p>
    <p> Vamos adicionar alguns emojis: 
        &#x1F62A;
    </p>
         

</body>
</html>
