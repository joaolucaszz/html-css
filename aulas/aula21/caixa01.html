<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo de Caixas</title>
    <style>
        h1 {
           background-color: aquamarine;
           width: 300px;
           height: 300px;
           border: 10px solid, blue;
           padding: 10px;
           margin: 10px auto 40px auto;
           outline: 5px solid chartreuse;
        }
        a {
            border-width: 10px;
            border-style: solid;
            border-color: brown;
            border: 10px solid brown;
            padding: 10px;
            
    
        }
     
    </style>
</head>
<body>
    <h1>Exemplo de caixa box-level</h1>
    <p>Páragrafos também são exemplos de box-level, pórem os <a href="#">links são exemplos de caixas inline-level</a>. Vamos ver como tudo isso funciona.</p>
    
</body>
